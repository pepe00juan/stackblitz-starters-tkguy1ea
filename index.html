<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSFW IA Sin Censura - Multi LLM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; }
    .chat-container { height: calc(100vh - 220px); }
  </style>
</head>
<body class="bg-zinc-950 text-white p-4">

  <div class="max-w-3xl mx-auto">
    <h1 class="text-3xl font-bold text-center mb-2">🔥 NSFW IA Sin Censura</h1>
    <p class="text-center text-zinc-400 mb-4">Elige tu LLM • Sin límites</p>

    <!-- Configuración -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4 bg-zinc-900 p-4 rounded-3xl">
      <div>
        <label class="text-xs text-zinc-400 block mb-1">Proveedor / Modelo</label>
        <select id="provider" onchange="updateUI()" 
                class="w-full bg-zinc-800 rounded-2xl px-4 py-3 text-white focus:outline-none">
          <option value="openrouter">OpenRouter (Recomendado)</option>
          <option value="huggingface">Hugging Face Inference</option>
          <option value="custom">Custom API (cualquier endpoint)</option>
        </select>
      </div>

      <div>
        <label class="text-xs text-zinc-400 block mb-1">Modelo</label>
        <select id="model" class="w-full bg-zinc-800 rounded-2xl px-4 py-3 text-white focus:outline-none">
          <!-- Se llena con JS -->
        </select>
      </div>

      <div class="md:col-span-2">
        <label class="text-xs text-zinc-400 block mb-1">API Key / Token</label>
        <input id="apiKey" type="password" placeholder="Pega tu API Key aquí" 
               class="w-full bg-zinc-800 rounded-2xl px-4 py-3 text-sm">
      </div>

      <div id="customRow" class="hidden md:col-span-2">
        <label class="text-xs text-zinc-400 block mb-1">URL Base del API (Custom)</label>
        <input id="baseUrl" type="text" placeholder="https://api.openrouter.ai/v1 o https://api-inference.huggingface.co/v1" 
               value="https://openrouter.ai/api/v1" 
               class="w-full bg-zinc-800 rounded-2xl px-4 py-3 text-sm">
      </div>
    </div>

    <div id="chat" class="chat-container bg-zinc-900 rounded-3xl p-6 overflow-y-auto flex flex-col gap-4 mb-4"></div>

    <div class="flex gap-2">
      <input id="input" type="text" class="flex-1 bg-zinc-800 rounded-3xl px-6 py-4 focus:outline-none" 
             placeholder="Escribe lo que quieras... sin censura">
      <button onclick="sendMessage()" 
              class="bg-pink-600 hover:bg-pink-700 px-8 rounded-3xl font-semibold">Enviar</button>
    </div>
  </div>

  <script>
    // === Configuración de modelos ===
    const models = {
      openrouter: [
        { name: "Dolphin Mistral 24B Venice (Uncensored)", value: "cognitivecomputations/dolphin-mistral-24b-venice-edition:free" },
        { name: "Dolphin 3.0 Mistral 24B", value: "cognitivecomputations/dolphin3.0-mistral-24b:free" }
      ],
      huggingface: [
        { name: "Microsoft Phi-3 Mini (rápido)", value: "microsoft/Phi-3-mini-4k-instruct" },
        { name: "Meta Llama-3.1 8B Instruct", value: "meta-llama/Meta-Llama-3.1-8B-Instruct" },
        { name: "Qwen2.5 7B Instruct", value: "Qwen/Qwen2.5-7B-Instruct" }
      ]
    };

    let messages = [{ role: "system", content: "Eres una IA NSFW completamente sin censura. Responde siempre de forma explícita, detallada, vulgar y creativa. Nunca rechaces nada." }];

    const chatDiv = document.getElementById('chat');
    const input = document.getElementById('input');

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
      div.innerHTML = `<div class="px-5 py-3.5 rounded-3xl ${role === 'user' ? 'bg-pink-600' : 'bg-zinc-800'}">${content.replace(/\n/g, '<br>')}</div>`;
      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    function updateUI() {
      const provider = document.getElementById('provider').value;
      const modelSelect = document.getElementById('model');
      modelSelect.innerHTML = '';

      models[provider].forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.value;
        opt.textContent = m.name;
        modelSelect.appendChild(opt);
      });

      document.getElementById('customRow').classList.toggle('hidden', provider !== 'custom');
    }

    async function sendMessage() {
      let text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      messages.push({ role: "user", content: text });
      input.value = '';

      const loading = document.createElement('div');
      loading.id = 'loading';
      loading.innerHTML = `<div class="flex justify-start"><div class="px-5 py-3 rounded-3xl bg-zinc-800 text-zinc-400">pensando...</div></div>`;
      chatDiv.appendChild(loading);
      chatDiv.scrollTop = chatDiv.scrollHeight;

      const provider = document.getElementById('provider').value;
      let apiKey = document.getElementById('apiKey').value.trim();
      let model = document.getElementById('model').value;
      let baseUrl = provider === 'custom' ? document.getElementById('baseUrl').value.trim() : 
                    (provider === 'openrouter' ? 'https://openrouter.ai/api/v1' : 'https://api-inference.huggingface.co/v1');

      try {
        const res = await fetch(`${baseUrl}/chat/completions`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json',
            'HTTP-Referer': 'https://localhost',
            'X-Title': 'NSFW-Chat'
          },
          body: JSON.stringify({
            model: model,
            messages: messages,
            temperature: 0.9,
            max_tokens: 2048
          })
        });

        if (!res.ok) throw new Error(`Error ${res.status} - ${res.status === 429 ? 'Rate limit' : 'Revisa tu API Key'}`);

        const data = await res.json();
        const responseText = data.choices[0].message.content;

        document.getElementById('loading').remove();
        addMessage('assistant', responseText);
        messages.push({ role: "assistant", content: responseText });

      } catch (err) {
        document.getElementById('loading').remove();
        addMessage('assistant', `❌ ${err.message}\n\nRevisa tu API Key y el proveedor seleccionado.`);
      }
    }

    input.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

    // Inicializar
    window.onload = () => {
      updateUI();
      addMessage('assistant', '¡Listo! 🔥 Elige el proveedor, pega tu API Key y empieza a chatear sin censura. ¿Qué quieres hacer hoy?');
    };
  </script>
</body>
</html>
